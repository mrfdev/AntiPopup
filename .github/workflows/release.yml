name: Draft candidate release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify candidate
        run: ./gradlew clean build --warning-mode all

      - name: Create checksum
        run: sha256sum build/libs/AntiPopup-*.jar > build/libs/SHA256SUMS

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          gh release create "candidate-${short_sha}" \
            build/libs/AntiPopup-*.jar \
            build/libs/SHA256SUMS \
            --draft \
            --generate-notes \
            --target "$GITHUB_SHA" \
            --title "AntiPopup Paper-only candidate ${short_sha}"
