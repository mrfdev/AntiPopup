name: Bug report
title: "[BUG] "
description: Create a report to help us improve
labels: bug
assignees: []

body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: input
    id: system
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: Arch Linux
    validations:
      required: true
  - type: input
    id: software
    attributes:
      label: Server Software
      description: Which Paper 26.2 build are you using?
      placeholder: Paper 26.2-56-main@8cd4f47
    validations:
      required: true
  - type: input
    id: java
    attributes:
      label: Java Version
      description: Include the complete output version, such as 25.0.2 or 26.0.1.
      placeholder: 26.0.1
    validations:
      required: true
  - type: input
    id: antipopup
    attributes:
      label: AntiPopup Version
      description: Include the plugin version and jar filename.
      placeholder: AntiPopup 13.2-paper-only.1 / AntiPopup-13.2-paper-only.1-j25-mc26.2.jar
    validations:
      required: true
  - type: dropdown
    id: ver
    attributes:
      label: Server Version
      description: What minecraft version is your server using?
      options:
        - "26.2"
    validations:
      required: true
  - type: textarea
    id: clients
    attributes:
      label: Client and Protocol Translation Versions
      description: List affected Minecraft client versions and exact ViaVersion, ViaBackwards, ViaRewind, or Geyser versions when present.
      placeholder: Minecraft 26.2; ViaVersion not installed
    validations:
      required: false
  - type: textarea
    id: plugins
    attributes:
      label: Plugin List
      description: What plugins are on your server?
      placeholder: AntiPopup, LuckPerms
      render: bash
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant AntiPopup Configuration
      description: Paste only relevant settings. Remove credentials, tokens, private addresses, and other private values first.
      render: yaml
    validations:
      required: false
  - type: input
    id: logs
    attributes:
      label: Server logs
      description: Paste a link to the complete relevant log after removing credentials, tokens, private IPs or addresses, and other private values.
    validations:
      required: true
