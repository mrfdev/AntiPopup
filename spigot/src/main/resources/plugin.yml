name: AntiPopup
version: '${version}'
main: com.github.kaspiandev.antipopup.spigot.AntiPopup
api-version: '26.2'
load: POSTWORLD
softdepend:
  - ProtocolLib
  - ProtocolSupport
  - ViaVersion
  - ViaBackwards
  - ViaRewind
  - Geyser-Spigot
authors: [ Kaspian ]
description: Helps remove the unsafe-server popup and limit vanilla chat reporting.
website: https://docs.1moreblock.com/custom-server-plugins/antipopup/
commands:
  antipopup:
    description: Main antipopup command.
    permission: antipopup.commands
    usage: /<command> info
permissions:
  antipopup.commands:
    description: Allows AntiPopup command dispatch; administrative actions still require the local console.
    default: true
folia-supported: true
